  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ine;gap:3px;margin-top:18px\"><div data-count-to=\"60\" data-count-prefix=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;color:#4FF0A0;line-height:1;text-shadow:0 0 24px rgba(79,240,160,.4)\">0<\u002Fdiv><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#4FF0A0;line-height:1\">s<\u002Fspan><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#A8B2BF;letter-spacing:.03em;margin-top:8px\" data-en=\"response to a new lead\">reakce na nový lead<\u002Fdiv><\u002Fdiv>\n    <div style=\"position:relative;overflow:hidden;background:linear-gradient(160deg,rgba(79,240,160,.14),rgba(79,240,160,.02));border:1px solid rgba(79,240,160,.3);border-radius:16px;padding:26px 22px;box-shadow:0 0 40px rgba(79,240,160,.08)\" style-hover=\"border-color:rgba(79,240,160,.6);box-shadow:0 0 50px rgba(79,240,160,.22);transform:translateY(-3px)\"><div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4FF0A0,transparent);animation:hoaSweep 3.2s linear infinite 2s;background-size:200% 100%\"><\u002Fdiv><div style=\"position:absolute;inset:-40% -10% auto auto;width:140px;height:140px;background:radial-gradient(circle,rgba(79,240,160,.18),transparent 70%);pointer-events:none\"><\u002Fdiv><div style=\"display:flex;align-items:center;gap:10px;position:relative\"><span style=\"width:34px;height:34px;border-radius:9px;background:rgba(79,240,160,.14);border:1px solid rgba(79,240,160,.3);display:flex;align-items:center;justify-content:center;color:#4FF0A0\"><i data-lucide=\"hourglass\" width=\"18\" height=\"18\" stroke-width=\"2\"><\u002Fi><\u002Fspan><span style=\"width:6px;height:6px;border-radius:50%;background:#4FF0A0;animation:hoaPulse 2s infinite 1.5s;margin-left:auto\"><\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:3px;margin-top:18px\"><div data-count-to=\"20\" data-count-prefix=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;color:#4FF0A0;line-height:1;text-shadow:0 0 24px rgba(79,240,160,.4)\">0<\u002Fdiv><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#4FF0A0;line-height:1\">h<\u002Fspan><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#A8B2BF;letter-spacing:.03em;margin-top:8px\" data-en=\"saved per week\">ušetřeno týdně<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n<\u002Fdiv>\n\n<!-- ================= PROBLEM ================= -->\n<section id=\"problem\" style=\"position:relative;padding:110px 28px;border-top:1px solid rgba(255,255,255,.05)\">\n  <div style=\"max-width:1240px;margin:0 auto\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;max-width:760px;margin:0 auto 60px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// The Problem\">// Problém<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,3.6vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1.08\" data-en=\"AI is evolving faster than anyone can keep up with.\">AI se vyvíjí rychleji, než kdokoli stíhá sledovat.<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.6;color:#98A2B0;margin-top:22px\" data-en=\"In just the past year: new model generations from leading labs, agentic systems rewriting company processes, and the EU AI Act now in force. A company that doesn't track this development systematically isn't making bad decisions — it's making <strong style='color:#fff;font-weight:600'>last year's<\u002Fstrong> decisions.\">Jen za poslední rok tu máme nové generace modelů od předních laboratoří, agentní systémy, které přepisují firemní procesy, a do toho ostrý provoz EU AI Act. Firma, která tento vývoj nesleduje systematicky, nedělá špatná rozhodnutí — dělá <strong style=\"color:#fff;font-weight:600\">loňská<\u002Fstrong> rozhodnutí.<\u002Fp>\n      <p style=\"font-size:17px;line-height:1.6;color:#98A2B0;margin-top:22px\" data-en=\"Your people have to focus on your core business. They can't monitor AI developments full-time on top of their everyday work. I can — it's my only job.\">Vaši lidé se musí soustředit na svůj hlavní byznys. Nemohou k běžné práci ještě na plný úvazek hlídat vývoj AI. Já ano — je to moje jediná práce.<\u002Fp>\n      <p style=\"font-size:17px;line-height:1.6;color:#98A2B0;margin-top:22px\" data-en=\"While individuals in your company have long been using ChatGPT, teams try new tools and vendors promise automation, leadership often lacks the overview. It doesn't know where AI actually earns money, where it truly saves time, what risks it creates — and above all, who is accountable for it.\">Zatímco jednotlivci ve firmě už dávno používají ChatGPT, týmy zkoušejí nové nástroje a dodavatelé slibují automatizace, vedení často chybí přehled. Neví, kde AI reálně vydělává, kde šetří čas, jaká vytváří rizika — a hlavně, kdo za ni nese odpovědnost.<\u002Fp>\n    <\u002Fdiv>\n    <div data-r=\"cols3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;background:linear-gradient(180deg,#0E1117,#0A0C11);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:30px\" style-hover=\"border-color:rgba(79,240,160,.32);transform:translateY(-4px)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#4FF0A0;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between\"><span style=\"width:40px;height:40px;border-radius:10px;background:rgba(79,240,160,.08);border:1px solid rgba(79,240,160,.2);display:flex;align-items:center;justify-content:center;color:#4FF0A0\"><i data-lucide=\"users-round\" width=\"20\" height=\"20\" stroke-width=\"1.75\"><\u002Fi><\u002Fspan><span>01<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:12px\" data-en=\"Teams use AI without governance.\">Týmy používají AI bez řízení.<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.55;color:#8A94A3\" data-en=\"AI grows across departments, but nobody manages it as a company capability.\">AI vzniká po odděleních, ale nikdo ji neřídí jako firemní schopnost.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s .08s,transform .7s .08s;background:linear-gradient(180deg,#0E1117,#0A0C11);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:30px\" style-hover=\"border-color:rgba(79,240,160,.32);transform:translateY(-4px)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#4FF0A0;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between\"><span style=\"width:40px;height:40px;border-radius:10px;background:rgba(79,240,160,.08);border:1px solid rgba(79,240,160,.2);display:flex;align-items:center;justify-content:center;color:#4FF0A0\"><i data-lucide=\"line-chart\" width=\"20\" height=\"20\" stroke-width=\"1.75\"><\u002Fi><\u002Fspan><span>02<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:12px\" data-en=\"Experiments without measurement.\">Experimenty bez měření.<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.55;color:#8A94A3\" data-en=\"The company tries tools but doesn't know where AI actually grows revenue, cuts cost or frees up team capacity.\">Firma zkouší nástroje, ale neví, kde AI reálně zvyšuje tržby, snižuje náklady nebo uvolňuje kapacitu týmu.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s .16s,transform .7s .16s;background:linear-gradient(180deg,#0E1117,#0A0C11);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:30px\" style-hover=\"border-color:rgba(79,240,160,.32);transform:translateY(-4px)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#4FF0A0;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between\"><span style=\"width:40px;height:40px;border-radius:10px;background:rgba(79,240,160,.08);border:1px solid rgba(79,240,160,.2);display:flex;align-items:center;justify-content:center;color:#4FF0A0\"><i data-lucide=\"shield-alert\" width=\"20\" height=\"20\" stroke-width=\"1.75\"><\u002Fi><\u002Fspan><span>03<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:12px\" data-en=\"Risk without an owner.\">Riziko bez vlastníka.<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.55;color:#8A94A3\" data-en=\"Data, legal liability, customer communication and output control stay unclear.\">Data, právní odpovědnost, komunikace se zákazníky a kontrola výstupů zůstávají nejasné.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" data-r=\"quote-row\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;position:relative;margin-top:24px;background:radial-gradient(120% 140% at 0% 0%,rgba(79,240,160,.08),transparent 60%),#0A0C11;border:1px solid rgba(79,240,160,.18);border-radius:16px;padding:38px;display:grid;grid-template-columns:auto 1fr;gap:30px;align-items:center\">\n      <span style=\"position:absolute;top:8px;left:24px;font-family:Georgia,serif;font-size:70px;line-height:1;color:#4FF0A0;opacity:.4\">\"<\u002Fspan>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:clamp(22px,2.4vw,30px);font-weight:600;color:#4FF0A0;line-height:1.2;margin-top:26px\" data-en=\"Tokens aren't&lt;br&gt;the outcome.\">Tokeny nejsou<br>výsledek.<\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.6;color:#B8C0CC\" data-en=\"AI value isn't created by burning more tokens, tools or prompts. It's created when AI takes over a concrete piece of work, has an owner, metrics, data rules and a clear boundary of human control. That's why I don't start by buying a tool — I start with the decision of where AI makes economic sense, and who is accountable for it.\">AI hodnota nevzniká tím, že firma spotřebuje víc tokenů, nástrojů nebo promptů. Vzniká tehdy, když AI převezme konkrétní část práce, má vlastníka, metriky, pravidla pro data a jasnou hranici lidské kontroly. Proto nezačínám nákupem nástroje — začínám rozhodnutím, kde má AI ekonomický smysl a kdo za ni ručí.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= SPRINT ================= -->\n<section id=\"sprint\" style=\"position:relative;padding:110px 28px;background:linear-gradient(180deg,#06070A,#080A0F)\">\n  <div style=\"max-width:1240px;margin:0 auto\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;max-width:820px;margin:0 auto 56px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// Core mandate\">// Hlavní mandát<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,3.6vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1.08\">90-Day AI Leadership Sprint<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.6;color:#98A2B0;margin-top:22px\" data-en=\"I don't sell a chatbot or a standalone audit. For 90 days I take on the role of external owner of your AI agenda — diagnose it, bring it under governance and deploy 2–3 priority AI workers into production or pilot.\">Neprodávám chatbota ani samostatný audit. Na 90 dní přebírám roli externího vlastníka AI agendy — zdiagnostikuju ji, dostanu pod governance a nasadím 2–3 prioritní AI pracovníky do provozu nebo pilotu.<\u002Fp>\n    <\u002Fdiv>\n    <div data-r=\"cols5\" style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px\">\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;background:#0C0E13;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px 20px;position:relative;overflow:hidden\" style-hover=\"border-color:rgba(79,240,160,.35)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4FF0A0,transparent)\"><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:rgba(79,240,160,.9);line-height:1\">01<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin:12px 0 6px\" data-en=\"Week 1–3\">Týden 1–3<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin-bottom:10px\">Diagnose<\u002Fh3>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#8A94A3\" data-en=\"CIPHER Snapshot: where AI makes economic sense, where the risk is and who decides.\">CIPHER Snapshot: kde má AI ekonomický smysl, kde je riziko a kdo za ni rozhoduje.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .06s,transform .6s .06s;background:#0C0E13;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px 20px;position:relative;overflow:hidden\" style-hover=\"border-color:rgba(79,240,160,.35)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4FF0A0,transparent)\"><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:rgba(79,240,160,.9);line-height:1\">02<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin:12px 0 6px\" data-en=\"Week 3–4\">Týden 3–4<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin-bottom:10px\">Prioritize<\u002Fh3>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#8A94A3\" data-en=\"Opportunity Map — first AI workers by impact, risk and data readiness.\">Opportunity Map — první AI pracovníci podle dopadu, rizika a datové připravenosti.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .12s,transform .6s .12s;background:#0C0E13;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px 20px;position:relative;overflow:hidden\" style-hover=\"border-color:rgba(79,240,160,.35)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4FF0A0,transparent)\"><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:rgba(79,240,160,.9);line-height:1\">03<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin:12px 0 6px\" data-en=\"Week 5–6\">Týden 5–6<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin-bottom:10px\">Architect<\u002Fh3>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#8A94A3\" data-en=\"Roadmap, governance, roles, rules and vendor-neutral architecture design.\">Roadmapa, governance, role, pravidla a vendor-neutral návrh architektury.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .18s,transform .6s .18s;background:#0C0E13;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px 20px;position:relative;overflow:hidden\" style-hover=\"border-color:rgba(79,240,160,.35)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4FF0A0,transparent)\"><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:rgba(79,240,160,.9);line-height:1\">04<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin:12px 0 6px\" data-en=\"Week 7–10\">Týden 7–10<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin-bottom:10px\">Deploy<\u002Fh3>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#8A94A3\" data-en=\"2–3 priority AI workers deployed into production or pilot operation.\">2–3 prioritní AI pracovníci nasazení do provozu nebo pilotního provozu.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .24s,transform .6s .24s;background:#0C0E13;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px 20px;position:relative;overflow:hidden\" style-hover=\"border-color:rgba(79,240,160,.35)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4FF0A0,transparent)\"><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:rgba(79,240,160,.9);line-height:1\">05<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin:12px 0 6px\" data-en=\"Week 11–12\">Týden 11–12<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin-bottom:10px\">Report<\u002Fh3>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#8A94A3\" data-en=\"Board-ready overview of impact, risks, decisions and next step.\">Board-ready přehled dopadu, rizik, rozhodnutí a dalšího kroku.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" data-r=\"price-row\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;margin-top:24px;display:grid;grid-template-columns:1fr auto;gap:30px;align-items:center;background:linear-gradient(120deg,rgba(79,240,160,.07),transparent 55%),#0A0C11;border:1px solid rgba(79,240,160,.2);border-radius:16px;padding:34px 38px\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#6B7585;letter-spacing:.06em;margin-bottom:10px\" data-en=\"Base fixed mandate\">Základní fixní mandát<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:clamp(24px,3vw,38px);font-weight:700;color:#E8ECF1\">510 000 Kč <span style=\"color:#4FF0A0;font-size:.6em\" data-en=\"excl. VAT / 90 days\">bez DPH / 90 dní<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#8A94A3;margin-top:12px;max-width:640px\" data-en=\"Roughly the cost of one senior developer per quarter — except instead of another pair of hands you get your AI agenda diagnosed, under governance and 2–3 AI workers in production or pilot.\">Zhruba cena jednoho seniorního developera za čtvrtletí — jenže místo dalšího páru rukou dostanete AI agendu zdiagnostikovanou, pod governance a 2–3 AI pracovníky v provozu nebo pilotu.<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"#contact\" style=\"align-self:center;white-space:nowrap;background:#4FF0A0;color:#04120B;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13.5px;padding:14px 22px;border-radius:10px\" style-hover=\"background:#7DF7BC\" data-en=\"Book a Call →\">Objednat call →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= CIPHER SNAPSHOT ================= -->\n<section style=\"position:relative;padding:110px 28px\">\n  <div data-r=\"snapshot\" style=\"max-width:1240px;margin:0 auto;display:grid;grid-template-columns:.9fr 1.1fr;gap:56px;align-items:start\">\n    <div data-reveal=\"1\" data-r=\"sticky-side\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;position:sticky;top:100px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// First phase of the sprint\">// První fáze sprintu<\u002Fdiv>\n      <h2 style=\"font-size:clamp(28px,3.2vw,42px);font-weight:700;letter-spacing:-.025em;line-height:1.1\" data-en=\"CIPHER Snapshot: in ~20 days you know what to build first.\">CIPHER Snapshot: za ~20 dní víte, co má smysl postavit jako první.<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.6;color:#98A2B0;margin-top:20px\" data-en=\"CIPHER Snapshot isn't a standalone service — it's the first diagnostic phase inside the sprint. Its goal isn't a presentation about the future of AI, but a decision for leadership.\">CIPHER Snapshot není samostatná služba — je to první diagnostická fáze uvnitř sprintu. Jejím cílem není prezentace o budoucnosti AI, ale rozhodnutí pro vedení.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateX(18px);transition:opacity .6s,transform .6s;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:22px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <span style=\"font-family:'JetBrains Mono',monospace;color:#4FF0A0;font-size:13px;margin-top:2px\">→<\u002Fspan>\n        <div><h3 style=\"font-size:17px;font-weight:600;margin-bottom:7px\" data-en=\"First AI workers with economic sense\">První AI pracovníci s ekonomickým smyslem<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"Where AI can grow revenue, cut cost or free up team capacity.\">Kde AI může zvýšit tržby, snížit náklady nebo uvolnit kapacitu týmu.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateX(18px);transition:opacity .6s .05s,transform .6s .05s;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:22px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <span style=\"font-family:'JetBrains Mono',monospace;color:#4FF0A0;font-size:13px;margin-top:2px\">→<\u002Fspan>\n        <div><h3 style=\"font-size:17px;font-weight:600;margin-bottom:7px\" data-en=\"Risks and where AI must not run unchecked\">Rizika a místa, kde AI nesmí běžet bez kontroly<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"Where a human, approval, limitation or different operating mode is required.\">Kde je nutný člověk, schvalování, omezení nebo jiný provozní režim.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateX(18px);transition:opacity .6s .1s,transform .6s .1s;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:22px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <span style=\"font-family:'JetBrains Mono',monospace;color:#4FF0A0;font-size:13px;margin-top:2px\">→<\u002Fspan>\n        <div><h3 style=\"font-size:17px;font-weight:600;margin-bottom:7px\" data-en=\"Ownership model\">Ownership model<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"Who decides, who approves, who operates and who bears responsibility.\">Kdo rozhoduje, kdo schvaluje, kdo provozuje a kdo nese odpovědnost.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateX(18px);transition:opacity .6s .15s,transform .6s .15s;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:22px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <span style=\"font-family:'JetBrains Mono',monospace;color:#4FF0A0;font-size:13px;margin-top:2px\">→<\u002Fspan>\n        <div><h3 style=\"font-size:17px;font-weight:600;margin-bottom:7px\" data-en=\"90-day deployment plan\">90denní plán nasazení<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"What to launch first, in what order, with what metrics and responsibilities.\">Co spustit jako první, v jakém pořadí, s jakými metrikami a odpovědnostmi.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateX(18px);transition:opacity .6s .2s,transform .6s .2s;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start;background:#0C0E13;border:1px solid rgba(255,80,80,.14);border-radius:13px;padding:22px\" style-hover=\"border-color:rgba(255,120,120,.35)\">\n        <span style=\"font-family:'JetBrains Mono',monospace;color:#FF7A7A;font-size:13px;margin-top:2px\">✕<\u002Fspan>\n        <div><h3 style=\"font-size:17px;font-weight:600;margin-bottom:7px\" data-en=\"What NOT to do\">Co nedělat<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"Which ideas would be expensive theatre, a technical toy or risk without return.\">Které nápady budou drahé divadlo, technická hračka nebo riziko bez návratnosti.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= AI WORKERS ================= -->\n<section id=\"workers\" style=\"position:relative;padding:110px 28px;background:linear-gradient(180deg,#080A0F,#06070A)\">\n  <div style=\"max-width:1240px;margin:0 auto\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;max-width:820px;margin:0 auto 56px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// AI Workers\">// AI pracovníci<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,3.6vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1.08\" data-en=\"We don't hunt abstract ideas. We hunt AI workers.\">Nehledáme abstraktní nápady. Hledáme AI pracovníky.<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.6;color:#98A2B0;margin-top:22px\" data-en=\"AI makes sense where it takes over a concrete piece of work: sales, leads, quotes, reception, support or operational routine. Not a chatbot for good feelings — a worker with measurable impact.\">AI má smysl tam, kde převezme konkrétní část práce: obchod, leady, nabídky, recepci, support nebo provozní rutinu. Ne chatbot pro dobrý pocit — pracovník s měřitelným dopadem.<\u002Fp>\n    <\u002Fdiv>\n    <div data-r=\"cols2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;background:linear-gradient(180deg,#0E1117,#0A0C11);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:30px\" style-hover=\"border-color:rgba(79,240,160,.32);transform:translateY(-4px)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;gap:12px\"><span style=\"width:38px;height:38px;border-radius:10px;background:rgba(79,240,160,.08);border:1px solid rgba(79,240,160,.2);display:flex;align-items:center;justify-content:center;color:#4FF0A0\"><i data-lucide=\"messages-square\" width=\"19\" height=\"19\" stroke-width=\"1.75\"><\u002Fi><\u002Fspan>[ WORKER_01 ]<\u002Fdiv>\n        <h3 style=\"font-size:21px;font-weight:600;letter-spacing:-.01em;margin-bottom:12px\">24/7 Social Media AI Manager<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.55;color:#8A94A3;margin-bottom:18px\" data-en=\"Watches comments and DMs, replies by brand rules, spots a sales opportunity and hands the lead to a human or into CRM.\">Sleduje komentáře a DM, odpovídá podle pravidel značky, rozpozná obchodní příležitost a předá lead člověku nebo do CRM.<\u002Fp>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#4FF0A0;line-height:1.5;border-top:1px solid rgba(255,255,255,.07);padding-top:16px\" data-en=\"→ faster response, more captured demand, less manual comms\">→ rychlejší reakce, víc zachycených poptávek, méně ruční komunikace<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .08s,transform .6s .08s;background:linear-gradient(180deg,#0E1117,#0A0C11);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:30px\" style-hover=\"border-color:rgba(79,240,160,.32);transform:translateY(-4px)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;gap:12px\"><span style=\"width:38px;height:38px;border-radius:10px;background:rgba(79,240,160,.08);border:1px solid rgba(79,240,160,.2);display:flex;align-items:center;justify-content:center;color:#4FF0A0\"><i data-lucide=\"phone-outgoing\" width=\"19\" height=\"19\" stroke-width=\"1.75\"><\u002Fi><\u002Fspan>[ WORKER_02 ]<\u002Fdiv>\n        <h3 style=\"font-size:21px;font-weight:600;letter-spacing:-.01em;margin-bottom:12px\">AI Inbound Sales Caller<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.55;color:#8A94A3;margin-bottom:18px\" data-en=\"Calls a new lead within 60 seconds, qualifies the demand, records the result and sets the next step.\">Zavolá novému leadu do 60 sekund, kvalifikuje poptávku, zapíše výsledek a domluví další krok.<\u002Fp>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#4FF0A0;line-height:1.5;border-top:1px solid rgba(255,255,255,.07);padding-top:16px\" data-en=\"→ fewer lost inquiries, higher sales speed\">→ méně ztracených poptávek, vyšší rychlost obchodu<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .16s,transform .6s .16s;background:linear-gradient(180deg,#0E1117,#0A0C11);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:30px\" style-hover=\"border-color:rgba(79,240,160,.32);transform:translateY(-4px)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;gap:12px\"><span style=\"width:38px;height:38px;border-radius:10px;background:rgba(79,240,160,.08);border:1px solid rgba(79,240,160,.2);display:flex;align-items:center;justify-content:center;color:#4FF0A0\"><i data-lucide=\"file-text\" width=\"19\" height=\"19\" stroke-width=\"1.75\"><\u002Fi><\u002Fspan>[ WORKER_03 ]<\u002Fdiv>\n        <h3 style=\"font-size:21px;font-weight:600;letter-spacing:-.01em;margin-bottom:12px\">AI Quote Assistant<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.55;color:#8A94A3;margin-bottom:18px\" data-en=\"From an email, form or notes it drafts a quote, gathers context and hands the salesperson a worked-up output.\">Z e-mailu, formuláře nebo poznámek připraví návrh nabídky, dohledá kontext a předá obchodníkovi rozpracovaný výstup.<\u002Fp>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#4FF0A0;line-height:1.5;border-top:1px solid rgba(255,255,255,.07);padding-top:16px\" data-en=\"→ faster quotes, less admin, higher sales capacity\">→ rychlejší nabídky, méně administrativy, vyšší kapacita obchodu<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .24s,transform .6s .24s;background:linear-gradient(180deg,#0E1117,#0A0C11);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:30px\" style-hover=\"border-color:rgba(79,240,160,.32);transform:translateY(-4px)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;gap:12px\"><span style=\"width:38px;height:38px;border-radius:10px;background:rgba(79,240,160,.08);border:1px solid rgba(79,240,160,.2);display:flex;align-items:center;justify-content:center;color:#4FF0A0\"><i data-lucide=\"headset\" width=\"19\" height=\"19\" stroke-width=\"1.75\"><\u002Fi><\u002Fspan>[ WORKER_04 ]<\u002Fdiv>\n        <h3 style=\"font-size:21px;font-weight:600;letter-spacing:-.01em;margin-bottom:12px\">AI Reception / Support Agent<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.55;color:#8A94A3;margin-bottom:18px\" data-en=\"Answers repeated questions, handles bookings, reschedules and FAQs — and escalates only exceptions.\">Odpovídá na opakované dotazy, řeší rezervace, změny termínů a FAQ — a předává jen výjimky.<\u002Fp>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#4FF0A0;line-height:1.5;border-top:1px solid rgba(255,255,255,.07);padding-top:16px\" data-en=\"→ less team load, 24/7 availability, consistent experience\">→ menší zátěž týmu, dostupnost 24/7, konzistentní zkušenost<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;margin-top:26px;text-align:center;max-width:840px;margin-left:auto;margin-right:auto;padding:34px\">\n      <span style=\"display:block;font-family:Georgia,serif;font-size:70px;line-height:1;color:#4FF0A0;opacity:.5;margin-bottom:-6px\">\"<\u002Fspan>\n      <p style=\"font-size:clamp(18px,2vw,24px);line-height:1.4;font-weight:500;color:#D8DEE6\" data-en=\"Most companies don't need more AI tools. They need one owner who decides where AI earns money, where the risk is — and who is accountable.\">Většina firem nepotřebuje víc AI nástrojů. Potřebuje jednoho vlastníka, který rozhodne, kde AI vydělává, kde je riziko — a kdo za ni ručí.<\u002Fp>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#6B7585;margin-top:16px\" data-en=\"— the principle behind every mandate I build\">— princip, podle kterého stavím každý mandát<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= CASE STUDIES ================= -->\n<section style=\"position:relative;padding:110px 28px\">\n  <div style=\"max-width:1240px;margin:0 auto\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;max-width:820px;margin:0 auto 52px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// From real operations\">// Z reálných provozů<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,3.6vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1.08\" data-en=\"AI systems already taking over work\">AI systémy, které už přebírají práci<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.6;color:#98A2B0;margin-top:20px\" data-en=\"Some projects are anonymized due to commercial sensitivity. What matters isn't the logos, but the type of work AI actually takes over.\">Některé projekty jsou anonymizované kvůli obchodní citlivosti. Důležité nejsou loga, ale typ práce, kterou AI skutečně přebírá.<\u002Fp>\n    <\u002Fdiv>\n    <div data-r=\"cols2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:28px\" style-hover=\"border-color:rgba(79,240,160,.28)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#98A2B0\" data-en=\"Hospitality / hotel operations\">Hospitality / hotelový provoz<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#4FF0A0;border:1px solid rgba(79,240,160,.3);border-radius:100px;padding:3px 10px;letter-spacing:.04em\">PILOT<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin-bottom:6px\" data-en=\"SYSTEM\">SYSTÉM<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.5;color:#C4CBD4;margin-bottom:16px\" data-en=\"AI concierge, internal knowledge base, guest requests and operational communication.\">AI concierge, interní znalostní báze, požadavky hostů a provozní komunikace.<\u002Fp>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin-bottom:6px\" data-en=\"TAKES OVER\">PŘEBÍRÁ<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.5;color:#8A94A3\" data-en=\"repeated guest questions, internal instructions and communication between reception, housekeeping and management.\">opakované dotazy hostů, interní instrukce a komunikaci mezi recepcí, housekeepingem a managementem.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .08s,transform .6s .08s;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:28px\" style-hover=\"border-color:rgba(79,240,160,.28)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#98A2B0\" data-en=\"B2B e-commerce / supply trade\">B2B e-commerce / dodavatelský obchod<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#4FF0A0;border:1px solid rgba(79,240,160,.3);border-radius:100px;padding:3px 10px;letter-spacing:.04em\">PILOT<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin-bottom:6px\" data-en=\"SYSTEM\">SYSTÉM<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.5;color:#C4CBD4;margin-bottom:16px\" data-en=\"AI support for customer reactivation, follow-ups and database work.\">AI podpora pro reaktivaci zákazníků, follow-upy a práci s databází.<\u002Fp>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin-bottom:6px\" data-en=\"TAKES OVER\">PŘEBÍRÁ<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.5;color:#8A94A3\" data-en=\"customer segmentation, message drafts, re-engagement and preparation of sales materials.\">třídění zákazníků, návrhy zpráv, re-engagement a přípravu obchodních podkladů.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .16s,transform .6s .16s;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:28px\" style-hover=\"border-color:rgba(79,240,160,.28)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#98A2B0\" data-en=\"Local premium service\">Lokální premium služba<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#4FF0A0;border:1px solid rgba(79,240,160,.3);border-radius:100px;padding:3px 10px;letter-spacing:.04em\">PILOT<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin-bottom:6px\" data-en=\"SYSTEM\">SYSTÉM<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.5;color:#C4CBD4;margin-bottom:16px\" data-en=\"AI social media manager for content, comment and DM replies — and thereby lead generation.\">AI social media manager pro tvorbu obsahu, odpovědi na komentáře a DM — a tím i generování leadů.<\u002Fp>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin-bottom:6px\" data-en=\"TAKES OVER\">PŘEBÍRÁ<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.5;color:#8A94A3\" data-en=\"first reactions to comments and messages, spotting opportunity and passing the lead to the next step.\">první reakce na komentáře a zprávy, rozpoznání příležitosti a předání leadu do dalšího kroku.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .24s,transform .6s .24s;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:28px\" style-hover=\"border-color:rgba(79,240,160,.28)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#98A2B0\" data-en=\"Inbound sales / phone qualification\">Inbound obchod / telefonická kvalifikace<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#C7A8FF;border:1px solid rgba(199,168,255,.3);border-radius:100px;padding:3px 10px;letter-spacing:.04em\">PROTOTYPE<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin-bottom:6px\" data-en=\"SYSTEM\">SYSTÉM<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.5;color:#C4CBD4;margin-bottom:16px\" data-en=\"Voice agent for rapid inquiry response and lead qualification.\">Voice agent pro rychlou reakci na poptávky a kvalifikaci leadů.<\u002Fp>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;margin-bottom:6px\" data-en=\"TAKES OVER\">PŘEBÍRÁ<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.5;color:#8A94A3\" data-en=\"first contact with the lead, qualifying the need, recording the result and handing to a salesperson.\">první kontakt s leadem, kvalifikaci potřeby, zápis výsledku a předání obchodníkovi.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= CIPHER METHOD ================= -->\n<section id=\"cipher\" style=\"position:relative;padding:110px 28px;background:linear-gradient(180deg,#06070A,#080A0F)\">\n  <div style=\"max-width:1240px;margin:0 auto\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;max-width:820px;margin:0 auto 52px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// The method behind it\">// Metoda v pozadí<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,3.6vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1.08\" data-en=\"CIPHER is the method behind it. You don't have to study it.\">CIPHER je metoda v pozadí. Vy ji nemusíte studovat.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:14px\">\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px 26px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <div style=\"width:64px;height:64px;border-radius:12px;background:#4FF0A0;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:#04120B;line-height:1\">C<\u002Fspan><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:4px\">CONTEXT<\u002Fdiv><h3 style=\"font-size:18px;font-weight:600;margin-bottom:6px\" data-en=\"Operational context\">Provozní kontext<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"Where AI already emerges in the company and what the real operational context is.\">Kde AI už ve firmě vzniká a jaký je skutečný provozní kontext.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .05s,transform .6s .05s;display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px 26px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <div style=\"width:64px;height:64px;border-radius:12px;background:#4FF0A0;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:#04120B;line-height:1\">I<\u002Fspan><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:4px\">IMPACT<\u002Fdiv><h3 style=\"font-size:18px;font-weight:600;margin-bottom:6px\" data-en=\"Economic impact\">Ekonomický dopad<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"Where the money, time, capacity, speed or cost is.\">Kde jsou peníze, čas, kapacita, rychlost nebo náklad.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .1s,transform .6s .1s;display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px 26px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <div style=\"width:64px;height:64px;border-radius:12px;background:#4FF0A0;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:#04120B;line-height:1\">P<\u002Fspan><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:4px\">PROCESS<\u002Fdiv><h3 style=\"font-size:18px;font-weight:600;margin-bottom:6px\" data-en=\"Process fit\">Vhodnost procesu<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"Which processes are suitable for an AI worker and which are not.\">Které procesy jsou vhodné pro AI pracovníka a které ne.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .15s,transform .6s .15s;display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px 26px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <div style=\"width:64px;height:64px;border-radius:12px;background:#4FF0A0;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:#04120B;line-height:1\">H<\u002Fspan><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:4px\">HUMAN<\u002Fdiv><h3 style=\"font-size:18px;font-weight:600;margin-bottom:6px\" data-en=\"Accountability\">Odpovědnost<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"Who decides, approves, checks and bears responsibility.\">Kdo rozhoduje, schvaluje, kontroluje a nese odpovědnost.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .2s,transform .6s .2s;display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px 26px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <div style=\"width:64px;height:64px;border-radius:12px;background:#4FF0A0;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:#04120B;line-height:1\">E<\u002Fspan><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:4px\">EXECUTION<\u002Fdiv><h3 style=\"font-size:18px;font-weight:600;margin-bottom:6px\" data-en=\"Deployment\">Nasazení<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"What to launch first so it isn't an experiment without a result.\">Co spustit jako první, aby to nebyl experiment bez výsledku.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .25s,transform .6s .25s;display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px 26px\" style-hover=\"border-color:rgba(79,240,160,.3)\">\n        <div style=\"width:64px;height:64px;border-radius:12px;background:#4FF0A0;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:#04120B;line-height:1\">R<\u002Fspan><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4FF0A0;letter-spacing:.06em;margin-bottom:4px\">RISK<\u002Fdiv><h3 style=\"font-size:18px;font-weight:600;margin-bottom:6px\" data-en=\"Risk control\">Kontrola rizika<\u002Fh3><p style=\"font-size:14.5px;line-height:1.5;color:#8A94A3\" data-en=\"What could harm the company and where human control must stay.\">Co může firmu poškodit a kde musí zůstat lidská kontrola.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;margin-top:22px;max-width:760px;margin-left:auto;margin-right:auto;background:#0A0C11;border:1px solid rgba(255,255,255,.07);border-left:2px solid #4FF0A0;border-radius:14px;padding:30px 34px\">\n      <span style=\"display:block;font-family:Georgia,serif;font-size:56px;line-height:1;color:#4FF0A0;opacity:.5;margin-bottom:-2px\">\"<\u002Fspan>\n      <p style=\"font-size:16px;line-height:1.6;color:#B8C0CC\"><span data-en=\"Internal workflows, customer communication, business data and operational know-how aren't scrap material for random AI experiments. \">Interní workflow, zákaznická komunikace, obchodní data a provozní know-how nejsou odpadní materiál pro náhodné AI experimenty. <\u002Fspan><span style=\"color:#4FF0A0;font-weight:600\" data-en=\"They are company assets that must have rules of use.\">Jsou to firemní aktiva, která musí mít pravidla použití.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= FIT ================= -->\n<section style=\"position:relative;padding:110px 28px\">\n  <div style=\"max-width:1240px;margin:0 auto\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;max-width:820px;margin:0 auto 50px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// When it makes sense\">// Kdy to dává smysl<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,3.6vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1.08\" data-en=\"For companies where AI is no longer a toy.\">Je to pro firmy, kde AI už není hračka.<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.6;color:#98A2B0;margin-top:20px\" data-en=\"It makes the most sense for owner-led and growth companies of roughly 20–500 people, where there's enough repetitive work for AI workers to make economic sense.\">Největší smysl to dává u owner-led a růstových firem přibližně 20–500 lidí, kde existuje dost opakované práce na to, aby AI pracovníci dávali ekonomický smysl.<\u002Fp>\n    <\u002Fdiv>\n    <div data-r=\"cols2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;background:linear-gradient(180deg,rgba(79,240,160,.05),transparent),#0A0C11;border:1px solid rgba(79,240,160,.2);border-radius:16px;padding:32px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#4FF0A0;margin-bottom:20px\" data-en=\"✓ MAKES SENSE IF:\">✓ DÁVÁ SMYSL, POKUD:<\u002Fdiv>\n        <ul style=\"list-style:none;display:flex;flex-direction:column;gap:14px\">\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#C4CBD4\"><span style=\"color:#4FF0A0;font-family:'JetBrains Mono',monospace\">+<\u002Fspan><span data-en=\"you have repetitive work in sales, customer comms or operations\">máte opakovanou práci v obchodě, zákaznické komunikaci nebo provozu<\u002Fspan><\u002Fli>\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#C4CBD4\"><span style=\"color:#4FF0A0;font-family:'JetBrains Mono',monospace\">+<\u002Fspan><span data-en=\"you have leads, inquiries, bookings, tickets or routine handled manually today\">máte leady, poptávky, rezervace, tickety nebo provozní rutinu, kterou dnes řeší lidé ručně<\u002Fspan><\u002Fli>\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#C4CBD4\"><span style=\"color:#4FF0A0;font-family:'JetBrains Mono',monospace\">+<\u002Fspan><span data-en=\"leadership knows AI will matter but won't buy tools blindly\">vedení ví, že AI bude důležitá, ale nechce kupovat nástroje naslepo<\u002Fspan><\u002Fli>\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#C4CBD4\"><span style=\"color:#4FF0A0;font-family:'JetBrains Mono',monospace\">+<\u002Fspan><span data-en=\"you lack a person to connect business, ops, IT, data and vendors\">chybí člověk, který propojí business, provoz, IT, data a dodavatele<\u002Fspan><\u002Fli>\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#C4CBD4\"><span style=\"color:#4FF0A0;font-family:'JetBrains Mono',monospace\">+<\u002Fspan><span data-en=\"you can invest hundreds of thousands of CZK into AI as a strategic priority\">dokážete investovat řádově statisíce korun do AI agendy jako do strategické priority<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s .1s,transform .6s .1s;background:#0A0C11;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:32px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#FF7A7A;margin-bottom:20px\" data-en=\"✕ NOT FOR YOU IF:\">✕ NENÍ TO PRO VÁS, POKUD:<\u002Fdiv>\n        <ul style=\"list-style:none;display:flex;flex-direction:column;gap:14px\">\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#8A94A3\"><span style=\"color:#FF7A7A;font-family:'JetBrains Mono',monospace\">−<\u002Fspan><span data-en=\"you're looking for a cheap chatbot\">hledáte levného chatbota<\u002Fspan><\u002Fli>\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#8A94A3\"><span style=\"color:#FF7A7A;font-family:'JetBrains Mono',monospace\">−<\u002Fspan><span data-en=\"you want an inspirational talk\">chcete inspirativní přednášku<\u002Fspan><\u002Fli>\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#8A94A3\"><span style=\"color:#FF7A7A;font-family:'JetBrains Mono',monospace\">−<\u002Fspan><span data-en=\"you're looking for an AI experiment for tens of thousands of CZK\">hledáte AI experiment za desítky tisíc korun<\u002Fspan><\u002Fli>\n          <li style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;font-size:15px;line-height:1.5;color:#8A94A3\"><span style=\"color:#FF7A7A;font-family:'JetBrains Mono',monospace\">−<\u002Fspan><span data-en=\"you lack leadership support or don't want to measure impact\">nemáte podporu vedení nebo nechcete měřit dopad<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= ABOUT ================= -->\n<section id=\"about\" style=\"position:relative;padding:110px 28px;background:linear-gradient(180deg,#080A0F,#06070A)\">\n  <div style=\"max-width:760px;margin:0 auto;text-align:center\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// Who's behind it\">// Kdo za tím stojí<\u002Fdiv>\n      <h2 style=\"font-size:clamp(28px,3.2vw,42px);font-weight:700;letter-spacing:-.025em;line-height:1.1\" data-en=\"Why I'm different\">V čem jsem jiný<\u002Fh2>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s .08s,transform .7s .08s;position:relative;width:220px;height:220px;margin:34px auto\">\n      <div style=\"position:absolute;inset:-14%;border-radius:50%;background:radial-gradient(circle,rgba(79,240,160,.3),transparent 62%);filter:blur(26px);animation:hoaFloat 7s ease-in-out infinite\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 210deg,rgba(79,240,160,.55),transparent 42%,transparent 76%,rgba(79,240,160,.35));animation:hoaSpin 16s linear infinite\"><\u002Fdiv>\n      <img src=\"2de0a63c-9f6d-4ad7-b386-e183e4f4ba91\" alt=\"David Veselý\" style=\"position:relative;width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:50% 20%;border:1px solid rgba(79,240,160,.25)\">\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s .12s,transform .7s .12s;margin-bottom:36px\">\n      <div style=\"font-weight:600;font-size:20px\">David Veselý<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#4FF0A0;margin-top:5px\" data-en=\"Founder · Vesely.ai s.r.o.\">Zakladatel · Vesely.ai s.r.o.<\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s .16s,transform .7s .16s;display:flex;flex-direction:column;gap:18px;font-size:16px;line-height:1.62;color:#A8B2BF;text-align:left\">\n      <p data-en=\"I'm David Veselý, founder of Vesely.ai s.r.o. I help company leadership get AI under control: set priorities, establish governance, deploy the first AI workers and measure impact.\">Jsem David Veselý, zakladatel Vesely.ai s.r.o. Pomáhám vedení firem dostat AI pod kontrolu: určit priority, nastavit governance, nasadit první AI pracovníky a měřit dopad.<\u002Fp>\n      <p data-en=\"AI leadership without delivery experience often ends at slides. I have my own AI agentic workforce platform Vesely.ai, so I handle AI not only strategically but practically: architecture, integrations, agentic workflows, MCP servers, operational limits and project economics.\">AI leadership bez delivery zkušenosti končí často u prezentací. Já mám vlastní AI agentic workforce platformu Vesely.ai, takže AI řeším nejen strategicky, ale i prakticky: architektura, integrace, agentická workflow, MCP servery, provozní limity i ekonomika projektu.<\u002Fp>\n      <p data-en=\"That lets me competently oversee your AI vendors, architecture, costs and real impact — and recognize when someone is just selling unnecessary scope, an overpriced stack or AI theatre.\">Díky tomu umím kvalifikovaně ohlídat vaše AI dodavatele, architekturu, náklady a reálný dopad — a poznat, kdy někdo jen prodává zbytečný scope, předražený stack nebo AI divadlo.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s .2s,transform .7s .2s;margin-top:28px;background:#0A0C11;border:1px solid rgba(255,255,255,.07);border-left:2px solid #4FF0A0;border-radius:12px;padding:24px 28px;text-align:left\">\n      <span style=\"display:block;font-family:Georgia,serif;font-size:56px;line-height:1;color:#4FF0A0;opacity:.5;margin-bottom:-2px\">\"<\u002Fspan>\n      <p style=\"font-size:18px;line-height:1.5;font-weight:500;color:#E8ECF1\" data-en=\"An AI vendor can deliver a tool. But it shouldn't own your AI strategy.\">AI dodavatel může dodat nástroj. Nemá ale vlastnit vaši AI strategii.<\u002Fp>\n      <p style=\"font-size:14px;color:#8A94A3;margin-top:12px\" data-en=\"I don't sell chatbots. I help company leadership take control of AI.\">Neprodávám chatboty. Pomáhám vedení firem převzít kontrolu nad AI.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= PROCESS / PRICING ================= -->\n<section style=\"position:relative;padding:110px 28px\">\n  <div style=\"max-width:1240px;margin:0 auto\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;max-width:820px;margin:0 auto 52px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:18px\" data-en=\"// The offer path\">// Nabídková cesta<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,3.6vw,48px);font-weight:700;letter-spacing:-.025em;line-height:1.08\" data-en=\"How the collaboration works\">Jak spolupráce probíhá<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.6;color:#98A2B0;margin-top:20px\" data-en=\"We start with a decision call. Only when it makes sense do we continue into the 90-day sprint. After the sprint, AI can stay managed on a retainer.\">Začínáme rozhodovacím callem. Teprve když dává smysl, pokračujeme 90denním sprintem. Po sprintu může AI zůstat řízená retainerem.<\u002Fp>\n    <\u002Fdiv>\n    < ,.38);border-radius:24px;padding:52px;box-shadow:0 0 0 1px rgba(79,240,160,.08),0 30px 90px rgba(79,240,160,.12),0 0 60px rgba(79,240,160,.1)\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#4FF0A0;margin-bottom:16px;border:1px solid rgba(79,240,160,.3);background:rgba(79,240,160,.08);padding:6px 12px;border-radius:100px\"><span style=\"width:6px;height:6px;border-radius:50%;background:#4FF0A0;animation:hoaPulse 2s infinite\"><\u002Fspan><span data-en=\"Not another AI workshop\">Ne další AI workshop<\u002Fspan><\u002Fdiv>\n      <h2 style=\"font-size:clamp(28px,3.2vw,42px);font-weight:700;letter-spacing:-.025em;line-height:1.1;margin-bottom:18px\" data-en=\"A decision call.\">Rozhodovací call.<\u002Fh2>\n      <p style=\"font-size:15.5px;line-height:1.6;color:#98A2B0;margin-bottom:20px\" data-en=\"In 30 minutes we'll find out whether your company needs a first AI worker, a 90-day sprint — or first to set up accountability.\">Během 30 minut zjistíme, jestli vaše firma potřebuje prvního AI pracovníka, 90denní sprint — nebo nejdřív nastavit odpovědnost.<\u002Fp>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#6B7585;line-height:1.7\">\n        <div><span style=\"color:#4FF0A0\">›<\u002Fspan> <span data-en=\"response within 24 hours\">ozvu se do 24 hodin<\u002Fspan><\u002Fdiv>\n        <div><span style=\"color:#4FF0A0\">›<\u002Fspan> <span data-en=\"no sales presentation\">bez prodejní prezentace<\u002Fspan><\u002Fdiv>\n        <div><span style=\"color:#4FF0A0\">›<\u002Fspan> hello@headofai.cz<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <form data-reveal=\"1\" onsubmit=\"{{ submitForm }}\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s .1s,transform .7s .1s;display:flex;flex-direction:column;gap:12px\">\n      <input required=\"\" placeholder=\"Jméno / Name\" style=\"background:#06070A;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 15px;color:#E8ECF1;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none\" style-focus=\"border-color:#4FF0A0\">\n      <input required=\"\" type=\"email\" placeholder=\"E-mail\" style=\"background:#06070A;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 15px;color:#E8ECF1;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none\" style-focus=\"border-color:#4FF0A0\">\n      <input placeholder=\"Firma / Company\" style=\"background:#06070A;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 15px;color:#E8ECF1;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none\" style-focus=\"border-color:#4FF0A0\">\n      <textarea rows=\"3\" placeholder=\"Kde AI dnes zasahuje váš provoz? / Where does AI touch your operations today?\" style=\"background:#06070A;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 15px;color:#E8ECF1;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;resize:vertical\" style-focus=\"border-color:#4FF0A0\"><\u002Ftextarea>\n      <button type=\"submit\" style=\"background:#4FF0A0;color:#04120B;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14.5px;padding:16px;border:none;border-radius:10px;cursor:pointer;box-shadow:0 0 32px rgba(79,240,160,.4)\" style-hover=\"background:#7DF7BC;box-shadow:0 0 44px rgba(79,240,160,.55);transform:translateY(-1px)\" data-en=\"Book AI Leadership Call\">Objednat AI Leadership Call<\u002Fbutton>\n      <p style=\"font-size:11px;color:#5C6470;line-height:1.5\" data-en=\"By submitting you agree to the processing of personal data.\">Odesláním souhlasíte se zpracováním osobních údajů dle zásad ochrany osobních údajů.<\u002Fp>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= FAQ ================= -->\n<section style=\"position:relative;padding:0 28px 110px\">\n  <div style=\"max-width:840px;margin:0 auto\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;margin-bottom:36px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#4FF0A0;margin-bottom:14px\">// FAQ<\u002Fdiv>\n      <h2 style=\"font-size:clamp(26px,3vw,36px);font-weight:700;letter-spacing:-.025em\" data-en=\"Frequent questions\">Časté otázky<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden\">\n        <button onclick=\"{{ toggleFaq }}\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;gap:16px;background:transparent;border:none;cursor:pointer;padding:20px 24px;text-align:left;color:#E8ECF1;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:500\"><span data-en=\"Is the AI Leadership Call free?\">Je AI Leadership Call zdarma?<\u002Fspan><span data-fq=\"1\" style=\"color:#4FF0A0;font-family:'JetBrains Mono',monospace;font-size:20px;transition:transform .3s;flex-shrink:0\">+<\u002Fspan><\u002Fbutton>\n        <div style=\"max-height:0;opacity:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease\"><p style=\"padding:0 24px 22px;font-size:15px;line-height:1.6;color:#98A2B0\" data-en=\"Yes. It's a 30-min decision call to verify fit. The goal isn't a free consultation, but to find out whether it makes sense to continue into the 90-Day AI Leadership Sprint.\">Ano. Je to 30min rozhodovací call pro ověření fitu. Cílem není bezplatná konzultace, ale zjistit, zda má smysl pokračovat do 90-Day AI Leadership Sprintu.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(14px);transition:opacity .5s .04s,transform .5s .04s;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden\">\n        <button onclick=\"{{ toggleFaq }}\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;gap:16px;background:transparent;border:none;cursor:pointer;padding:20px 24px;text-align:left;color:#E8ECF1;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:500\"><span data-en=\"Is CIPHER Snapshot a standalone service?\">Je CIPHER Snapshot samostatná služba?<\u002Fspan><span data-fq=\"1\" style=\"color:#4FF0A0;font-family:'JetBrains Mono',monospace;font-size:20px;transition:transform .3s;flex-shrink:0\">+<\u002Fspan><\u002Fbutton>\n        <div style=\"max-height:0;opacity:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease\"><p style=\"padding:0 24px 22px;font-size:15px;line-height:1.6;color:#98A2B0\" data-en=\"No. CIPHER Snapshot is the first diagnostic phase inside the sprint, not a standalone product. The first ~20 days decide what's worth building, where the risk is and who decides about AI.\">Ne. CIPHER Snapshot je první diagnostická fáze uvnitř sprintu, ne samostatný produkt. Prvních ~20 dní sprintu rozhodne, co má smysl stavět, kde je riziko a kdo za AI rozhoduje.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(14px);transition:opacity .5s .08s,transform .5s .08s;background:#0C0E13;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden\">\n        <button onclick=\"{{ toggleFaq }}\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;gap:16px;background:transparent;border:none;cursor:pointer;padding:20px 24px;text-align:left;color:#E8ECF1;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:500\"><span data-en=\"How much does the sprint cost?\">Kolik stojí sprint?
