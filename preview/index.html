%;display:flex;justify-content:space-between;align-items:center;gap:16px;background:transparent;border:none;cursor:pointer;padding:20px 24px;text-align:left;color:#E8ECF1;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:500\"><span data-en=\"What if we just want a chatbot?\">Co když chceme jen chatbota?<\u002Fspan><span data-fq=\"1\" style=\"color:#4FF0A0;font-family:'JetBrains Mono',monospace;font-size:20px;transition:transform .3s;flex-shrink:0\">+<\u002Fspan><\u002Fbutton>\n        <div style=\"max-height:0;opacity:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease\"><p style=\"padding:0 24px 22px;font-size:15px;line-height:1.6;color:#98A2B0\" data-en=\"Then it's probably not the right fit. A chatbot can be part of the solution, but the goal isn't a chatbot — it's an AI worker with clear accountability and measurable impact.\">Pak to pravděpodobně není správný fit. Chatbot může být součástí řešení, ale cílem není chatbot — cílem je AI pracovník s jasnou odpovědností a měřitelným dopadem.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= FOOTER ================= -->\n<footer style=\"position:relative;padding:56px 28px 40px;border-top:1px solid rgba(255,255,255,.07);background:#080A0F\">\n  <div data-r=\"footer\" style=\"max-width:1240px;margin:0 auto;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px\">\n    <div>\n      <div style=\"display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;margin-bottom:14px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#4FF0A0\"><\u002Fspan>headofai<span style=\"color:#4FF0A0\">.cz<\u002Fspan><\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.6;color:#8A94A3;max-width:340px\" data-en=\"Fractional AI leadership for companies that want control, measurable impact and their first AI workers in production.\">Fractional AI leadership pro firmy, které chtějí kontrolu, měřitelný dopad a první AI pracovníky v provozu.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;letter-spacing:.06em;margin-bottom:14px\" data-en=\"CONTACT\">KONTAKT<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;font-size:14px;color:#98A2B0\">\n        <a href=\"mailto:hello@headofai.cz\" style=\"color:#98A2B0;display:flex;align-items:center;gap:9px\" style-hover=\"color:#4FF0A0\"><i data-lucide=\"mail\" width=\"16\" height=\"16\" stroke-width=\"1.75\"><\u002Fi>hello@headofai.cz<\u002Fa>\n        <a href=\"https://x.com/headofaicz\" style=\"color:#98A2B0;display:flex;align-items:center;gap:9px\" style-hover=\"color:#4FF0A0\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"flex-shrink:0\"><path d=\"M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z\"><\u002Fpath><\u002Fsvg>@headofaicz<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7585;letter-spacing:.06em;margin-bottom:14px\" data-en=\"OPERATOR\">PROVOZOVATEL<\u002Fdiv>\n      <div style=\"font-size:14px;line-height:1.7;color:#98A2B0\">Vesely.ai s.r.o.<br>IČO: 23702907<br>DIČ: CZ23702907<br>Česká republika<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:1240px;margin:36px auto 0;padding-top:22px;border-top:1px solid rgba(255,255,255,.06);display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5C6470\">\n    <span>© 2026 Vesely.ai s.r.o. · headofai.cz<\u002Fspan>\n    <span data-en=\"Sample situations and projects are anonymized.\">Vzorové situace a projekty jsou anonymizované.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._lang = 'cz';\n    if (window.lucide) window.lucide.createIcons();\n    else {\n      const s = document.querySelector('script[src*=\"lucide\"]');\n      if (s) s.addEventListener('load', () => window.lucide && window.lucide.createIcons());\n    }\n    // scroll reveal\n    try {\n      const counted = new WeakSet();\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            const counters = e.target.querySelectorAll('[data-count-to]');\n            counters.forEach((c) => { if (!counted.has(c)) { counted.add(c); this.animateCount(c); } });\n            io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\n      document.querySelectorAll('[data-reveal]').forEach((el) => io.observe(el));\n      // safety fallback\n      setTimeout(() => {\n        document.querySelectorAll('[data-reveal]').forEach((el) => {\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n        });\n        document.querySelectorAll('[data-count-to]').forEach((c) => { if (!counted.has(c)) { counted.add(c); this.animateCount(c); } });\n      }, 3500);\n    } catch (err) {\n      document.querySelectorAll('[data-reveal]').forEach((el) => {\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n      });\n    }\n  }\n\n  animateCount(el) {\n    const target = parseInt(el.getAttribute('data-count-to'), 10) || 0;\n    const prefix = el.getAttribute('data-count-prefix') || '';\n    const dur = 1200;\n    const start = performance.now();\n    const step = (now) => {\n      const t = Math.min(1, (now - start) / dur);\n      const eased = 1 - Math.pow(1 - t, 3);\n      el.textContent = prefix + Math.round(eased * target);\n      if (t < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n\n  renderVals() {\n    return {\n      toggleLang: () => {\n        const to = this._lang === 'en' ? 'cz' : 'en';\n        this._lang = to;\n        document.querySelectorAll('[data-en]').forEach((el) => {\n          if (el.getAttribute('data-cz') === null) {\n            el.setAttribute('data-cz', el.innerHTML);\n          }\n          el.innerHTML = to === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-cz');\n        });\n        document.querySelectorAll('[data-langlabel]').forEach((b) => {\n          b.textContent = to === 'en' ? 'CZ' : 'EN';\n        });\n      },\n      toggleFaq: (e) => {\n        const btn = e.currentTarget;\n        const ans = btn.nextElementSibling;\n        const icon = btn.querySelector('[data-fq]');\n        const isOpen = ans.style.maxHeight && ans.style.maxHeight !== '0px';\n        if (isOpen) {\n          ans.style.maxHeight = '0px';\n          ans.style.opacity = '0';\n          if (icon) icon.style.transform = 'rotate(0deg)';\n        } else {\n          ans.style.maxHeight = ans.scrollHeight + 'px';\n          ans.style.opacity = '1';\n          if (icon) icon.style.transform = 'rotate(45deg)';\n        }\n      },\n      submitForm: (e) => {\n        e.preventDefault();\n        const form = e.currentTarget;\n        const btn = form.querySelector('button[type=\"submit\"]');\n        if (btn) {\n          btn.textContent = this._lang === 'en' ? '✓ Sent — I\\'ll be in touch within 24h' : '✓ Odesláno — ozvu se do 24 hodin';\n          btn.style.background = '#7DF7BC';\n          btn.disabled = true;\n        }\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
